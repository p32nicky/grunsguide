name: Post Grüns to Tumblr Hourly

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests requests-oauthlib
      - name: Post to Tumblr
        env:
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
        run: |
          cat > scripts/tumblr-tokens.json << EOF
          {
            "consumer_key": "${{ env.TUMBLR_CONSUMER_KEY }}",
            "consumer_secret": "${{ env.TUMBLR_CONSUMER_SECRET }}",
            "user_token": "${{ env.TUMBLR_TOKEN }}",
            "user_secret": "${{ env.TUMBLR_TOKEN_SECRET }}"
          }
          EOF
          python scripts/post-to-tumblr.py
      - name: Commit posted
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/tumblr-posted.json scripts/tumblr-posting-log.csv || true
          git commit -m "Update Tumblr posted tracking [skip ci]" || exit 0
          git push || exit 0
