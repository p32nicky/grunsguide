name: Grüns auto-post to YouTube

on:
  schedule:
    - cron: "0 */3 * * *"      # every 3 hours (UTC)
  workflow_dispatch:            # allow manual run

permissions:
  contents: write               # to commit the posted log back

concurrency:
  group: gruns-autopost
  cancel-in-progress: false     # never run two at once

jobs:
  post:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8
      GRUNS_ARTICLES_DIR: ${{ github.workspace }}/content/articles
      GRUNS_COMPOSER_DIR: ${{ github.workspace }}/video/remotion-composer
      GRUNS_OUT_DIR: ${{ github.workspace }}/video/_out
      GRUNS_PIPER_VOICE: ${{ github.workspace }}/video/piper-voices/en_US-lessac-medium.onnx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps for headless Chrome (Remotion)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libgbm1 \
            libasound2 libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 \
            libxdamage1 libpango-1.0-0 libcairo2 libcups2

      - name: Install Remotion deps
        working-directory: video/remotion-composer
        run: npm install --no-audit --no-fund

      - name: Install Python deps
        run: pip install piper-tts google-auth google-auth-oauthlib google-api-python-client requests

      - name: Download Piper voice
        run: |
          mkdir -p video/piper-voices
          cd video/piper-voices
          python -m piper.download_voices en_US-lessac-medium
          ls -la

      - name: Write YouTube secrets
        run: |
          printf '%s' '${{ secrets.GRUNS_YT_TOKEN }}'  > youtube/gruns_token.json
          printf '%s' '${{ secrets.GRUNS_YT_CLIENT }}' > youtube/gruns_client_secret.json
          printf '%s' '${{ secrets.GRUNS_YT_LOCK }}'   > youtube/channel_lock.json
          python -c "import json;[json.load(open('youtube/'+f)) for f in ('gruns_token.json','channel_lock.json')];print('secrets parse OK')"

      - name: Render + upload one video
        run: python video/autopost.py

      - name: Commit posted log
        run: |
          git config user.name  "gruns-autopost"
          git config user.email "actions@github.com"
          git add youtube/gruns_posted.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "autopost: mark video posted [skip ci]"
            git push
          fi
